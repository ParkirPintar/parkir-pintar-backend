syntax = "proto3";
package user;
option go_package = "github.com/parkir-pintar/proto/user";

service UserService {
  rpc Register(RegisterRequest) returns (UserResponse);
  rpc Login(LoginRequest) returns (LoginResponse);
  rpc Logout(LogoutRequest) returns (LogoutResponse);
  rpc RefreshToken(RefreshTokenRequest) returns (LoginResponse);
  rpc GetProfile(GetProfileRequest) returns (UserResponse);
  rpc UpdateProfile(UpdateProfileRequest) returns (UserResponse);
}

message RegisterRequest {
  string license_plate = 1;
  string vehicle_type  = 2;  // CAR | MOTORCYCLE
  string password      = 3;
  string name          = 4;
  string phone_number  = 5;
}

message LoginRequest {
  string license_plate = 1;
  string vehicle_type  = 2;
  string password      = 3;
}

message LoginResponse {
  string user_id        = 1;
  string access_token   = 2;
  string refresh_token  = 3;
}

message LogoutRequest  { string access_token = 1; }
message LogoutResponse { bool success = 1; }

message RefreshTokenRequest { string refresh_token = 1; }

message GetProfileRequest    { string user_id = 1; }

message UpdateProfileRequest {
  string user_id      = 1;
  string name         = 2;
  string phone_number = 3;
}

message UserResponse {
  string user_id       = 1;
  string license_plate = 2;
  string vehicle_type  = 3;
  string name          = 4;
  string phone_number  = 5;
}
