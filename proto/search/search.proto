syntax = "proto3";
package search;
option go_package = "github.com/parkir-pintar/proto/search";

service SearchService {
  rpc GetAvailability(GetAvailabilityRequest) returns (GetAvailabilityResponse);
  rpc GetFirstAvailable(GetFirstAvailableRequest) returns (GetFirstAvailableResponse);
}

message GetAvailabilityRequest {
  int32 floor = 1;
  string vehicle_type = 2;
}

message SpotSummary {
  string spot_id = 1;
  int32 floor = 2;
  string vehicle_type = 3;
  string status = 4;
}

message GetAvailabilityResponse {
  int32 floor = 1;
  string vehicle_type = 2;
  int32 total_available = 3;
  repeated SpotSummary spots = 4;
}

message GetFirstAvailableRequest {
  string vehicle_type = 1;
}

message GetFirstAvailableResponse {
  string spot_id = 1;
}
