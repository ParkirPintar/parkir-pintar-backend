syntax = "proto3";
package payment;
option go_package = "github.com/parkir-pintar/proto/payment";

service PaymentService {
  rpc CreatePayment(CreatePaymentRequest) returns (PaymentResponse);
  rpc GetPaymentStatus(GetPaymentStatusRequest) returns (PaymentResponse);
  rpc RetryPayment(RetryPaymentRequest) returns (PaymentResponse);
}

message CreatePaymentRequest {
  string invoice_id = 1;
  int64 amount = 2;
  string idempotency_key = 3;
}

message GetPaymentStatusRequest {
  string payment_id = 1;
}

message RetryPaymentRequest {
  string payment_id = 1;
  string idempotency_key = 2;
}

message PaymentResponse {
  string payment_id = 1;
  string invoice_id = 2;
  string status = 3;   // PENDING | PAID | FAILED
  int64 amount = 4;
  string method = 5;
  string qr_code = 6;
  string updated_at = 7;
}
