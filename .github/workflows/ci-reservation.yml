name: CI - Reservation Service

on:
  push:
    branches: [main, develop]
    paths:
      - 'services/reservation/**'
      - 'proto/reservation/**'
  pull_request:
    branches: [main, develop]
    paths:
      - 'services/reservation/**'
      - 'proto/reservation/**'
  workflow_dispatch:
    inputs:
      deploy:
        description: 'Build & Deploy to ECR/EKS (requires terraform infra)'
        required: true
        type: boolean
        default: true

env:
  SERVICE: reservation
  SERVICE_PATH: services/reservation
  GO_VERSION: '1.25'
  IMAGE_NAME: parkir-pintar/reservation-service

jobs:
  code-quality:
    name: Code Quality & Security
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Secret Detection
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
        continue-on-error: true

      - name: Hadolint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: ${{ env.SERVICE_PATH }}/build/Dockerfile
          failure-threshold: error

      - name: Dependency Scan
        env:
          GOWORK: off
        run: |
          cd ${{ env.SERVICE_PATH }}
          go mod download
          go list -json -m all | grep -v "^{" || true
        continue-on-error: true

  verify-code-quality:
    name: Verify Code Quality
    runs-on: ubuntu-latest
    needs: code-quality
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: ${{ env.SERVICE_PATH }}/go.sum

      - name: Go Lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: ${{ env.SERVICE_PATH }}
        continue-on-error: true

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: verify-code-quality
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: ${{ env.SERVICE_PATH }}/go.sum

      - name: Run Basic Security Checks
        run: |
          echo "Running basic security checks..."
          grep -r "password" ${{ env.SERVICE_PATH }}/ --include="*.go" --exclude-dir=testdata || true
          grep -r "secret" ${{ env.SERVICE_PATH }}/ --include="*.go" --exclude-dir=testdata || true
          echo "Security scan completed"
        continue-on-error: true

  test-coverage:
    name: Unit Tests & Coverage
    runs-on: ubuntu-latest
    needs: security-scan
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: ${{ env.SERVICE_PATH }}/go.sum

      - name: Unit Tests
        env:
          GOWORK: off
        run: |
          cd ${{ env.SERVICE_PATH }}
          go mod download
          go test -v -race -short -coverprofile=coverage.out ./...
          if [ -f coverage.out ] && grep -q -v '^mode:' coverage.out 2>/dev/null; then
            go tool cover -html=coverage.out -o coverage.html
          else
            echo "No coverage data generated (no test files found)"
            echo "mode: set" > coverage.out
          fi

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v6
        with:
          args: >
            -Dsonar.projectKey=ParkirPintar_parkir-pintar-backend
            -Dsonar.organization=parkirpintar
            -Dsonar.sources=${{ env.SERVICE_PATH }}
            -Dsonar.tests=${{ env.SERVICE_PATH }}
            -Dsonar.test.inclusions=**/*_test.go
            -Dsonar.exclusions=**/vendor/**,**/*_test.go,**/proto/**/*.go,**/migrations/**
            -Dsonar.go.coverage.reportPaths=${{ env.SERVICE_PATH }}/coverage.out
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Upload Coverage
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.SERVICE }}-coverage
          path: ${{ env.SERVICE_PATH }}/coverage.out

  build:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    needs: test-coverage
    if: github.event_name == 'workflow_dispatch' && inputs.deploy
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-southeast-1

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ env.SERVICE_PATH }}/build/Dockerfile
          push: true
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ steps.ecr-login.outputs.registry }}/${{ env.IMAGE_NAME }}:latest

  deploy:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'workflow_dispatch' && inputs.deploy
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-southeast-1

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name parkirpintar --region ap-southeast-1

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Render manifest with image tag
        run: |
          sed -i "s|parkirpintar/${{ env.SERVICE }}-service:latest|${{ steps.ecr-login.outputs.registry }}/${{ env.IMAGE_NAME }}:${{ github.sha }}|g" \
            sre/kubernetes/base/${{ env.SERVICE }}-service.yaml

      - name: Apply manifest
        run: kubectl apply -f sre/kubernetes/base/${{ env.SERVICE }}-service.yaml

      - name: Wait for rollout
        run: kubectl rollout status deployment/${{ env.SERVICE }}-service -n parkir-pintar --timeout=120s
