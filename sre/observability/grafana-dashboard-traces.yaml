apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-traces
  namespace: monitoring
data:
  traces.json: |
    {
      "uid": "parkir-traces",
      "title": "Parkir Pintar - Traces & Logs Correlation",
      "description": "Distributed tracing with log correlation. Click trace_id in logs to jump to full trace in Tempo.",
      "tags": [
        "parkir-pintar",
        "traces",
        "tempo",
        "correlation"
      ],
      "timezone": "browser",
      "refresh": "30s",
      "time": {
        "from": "now-1h",
        "to": "now"
      },
      "templating": {
        "list": [
          {
            "name": "service",
            "type": "custom",
            "query": "reservation-service,billing-service,payment-service,search-service,presence-service,notification-service,analytics-service,gateway-service",
            "multi": false,
            "includeAll": true,
            "current": {
              "text": "All",
              "value": "$__all"
            }
          },
          {
            "name": "min_duration",
            "type": "custom",
            "query": "0ms,10ms,50ms,100ms,500ms,1s,2s,5s,10s",
            "current": {
              "text": "0ms",
              "value": "0ms"
            }
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "title": "Recent Trace Operations (by P95 duration)",
          "description": "Top operations by P95 latency from span metrics. Use Explore for full trace search.",
          "type": "table",
          "gridPos": {
            "h": 14,
            "w": 24,
            "x": 0,
            "y": 0
          },
          "datasource": "Prometheus",
          "targets": [
            {
              "refId": "A",
              "expr": "topk(20, histogram_quantile(0.95, sum(rate(traces_traces_duration_milliseconds_bucket{span_kind=~\"SPAN_KIND_SERVER|SPAN_KIND_CLIENT\"}[5m])) by (le, service_name, span_name)))",
              "format": "table",
              "instant": true
            }
          ],
          "transformations": [
            {
              "id": "organize",
              "options": {
                "excludeByName": {
                  "Time": true,
                  "le": true
                },
                "renameByName": {
                  "service_name": "Service",
                  "span_name": "Operation",
                  "Value": "P95 Duration (ms)"
                }
              }
            },
            {
              "id": "sortBy",
              "options": {
                "sort": [
                  {
                    "field": "P95 Duration (ms)",
                    "desc": true
                  }
                ]
              }
            }
          ],
          "fieldConfig": {
            "defaults": {},
            "overrides": [
              {
                "matcher": {
                  "id": "byName",
                  "options": "P95 Duration (ms)"
                },
                "properties": [
                  {
                    "id": "unit",
                    "value": "ms"
                  },
                  {
                    "id": "decimals",
                    "value": 1
                  },
                  {
                    "id": "custom.cellOptions",
                    "value": {
                      "type": "color-background",
                      "mode": "gradient"
                    }
                  },
                  {
                    "id": "color",
                    "value": {
                      "mode": "continuous-GrYlRd"
                    }
                  }
                ]
              }
            ]
          }
        },
        {
          "id": 2,
          "title": "Error Spans Rate",
          "description": "Rate of spans with error status code, grouped by service and operation",
          "type": "timeseries",
          "gridPos": {
            "h": 12,
            "w": 24,
            "x": 0,
            "y": 14
          },
          "datasource": "Prometheus",
          "targets": [
            {
              "refId": "A",
              "expr": "sum(rate(traces_traces_calls_total{status_code=\"STATUS_CODE_ERROR\"}[5m])) by (service_name, span_name)",
              "legendFormat": "{{service_name}} - {{span_name}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "ops",
              "custom": {
                "drawStyle": "line",
                "fillOpacity": 20
              }
            }
          }
        },
        {
          "id": 3,
          "title": "\ud83d\udcca Trace Duration Distribution (P50/P95/P99)",
          "description": "Span duration percentiles from Tempo metrics - shows latency trends per service",
          "type": "timeseries",
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 26
          },
          "datasource": {
            "uid": "prometheus",
            "type": "prometheus"
          },
          "targets": [
            {
              "expr": "histogram_quantile(0.50, sum(rate(traces_traces_duration_milliseconds_bucket[5m])) by (le, span_name))",
              "legendFormat": "P50 {{span_name}}"
            },
            {
              "expr": "histogram_quantile(0.95, sum(rate(traces_traces_duration_milliseconds_bucket[5m])) by (le, span_name))",
              "legendFormat": "P95 {{span_name}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "ms",
              "custom": {
                "drawStyle": "line",
                "fillOpacity": 10
              }
            }
          }
        },
        {
          "id": 4,
          "title": "\ud83d\udcc8 Span Rate per Service",
          "description": "Number of spans generated per service - shows activity level",
          "type": "timeseries",
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 26
          },
          "datasource": {
            "uid": "prometheus",
            "type": "prometheus"
          },
          "targets": [
            {
              "expr": "sum(rate(traces_traces_calls_total[5m])) by (span_name)",
              "legendFormat": "{{span_name}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "ops",
              "custom": {
                "drawStyle": "line",
                "fillOpacity": 15
              }
            }
          }
        },
        {
          "id": 5,
          "title": "\ud83d\udccb Logs with Trace Context (Loki)",
          "description": "Structured logs with trace_id field. Click the TraceID link to jump to the full trace in Tempo.",
          "type": "logs",
          "gridPos": {
            "h": 12,
            "w": 24,
            "x": 0,
            "y": 34
          },
          "datasource": {
            "uid": "loki",
            "type": "loki"
          },
          "targets": [
            {
              "expr": "{namespace=\"parkir-pintar\"} |= \"trace_id\"",
              "refId": "A"
            }
          ],
          "options": {
            "showTime": true,
            "showLabels": true,
            "showCommonLabels": false,
            "wrapLogMessage": true,
            "prettifyLogMessage": false,
            "enableLogDetails": true,
            "dedupStrategy": "none",
            "sortOrder": "Descending"
          }
        },
        {
          "id": 6,
          "title": "\ud83d\udea8 Error Logs with Trace Context",
          "description": "Error-level logs with trace correlation - click TraceID to see what went wrong across services",
          "type": "logs",
          "gridPos": {
            "h": 10,
            "w": 24,
            "x": 0,
            "y": 46
          },
          "datasource": {
            "uid": "loki",
            "type": "loki"
          },
          "targets": [
            {
              "expr": "{namespace=\"parkir-pintar\"} |~ \"ERR|error|ERROR\"",
              "refId": "A"
            }
          ],
          "options": {
            "showTime": true,
            "showLabels": true,
            "enableLogDetails": true,
            "sortOrder": "Descending"
          }
        },
        {
          "id": 7,
          "title": "\ud83d\uddfa\ufe0f Service Graph (from Traces)",
          "description": "Auto-generated service dependency graph from trace data. Shows real call paths between services.",
          "type": "nodeGraph",
          "gridPos": {
            "h": 14,
            "w": 24,
            "x": 0,
            "y": 56
          },
          "datasource": {
            "uid": "tempo",
            "type": "tempo"
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "uid": "tempo",
                "type": "tempo"
              },
              "queryType": "serviceMap",
              "expr": ""
            }
          ]
        },
        {
          "id": 8,
          "title": "\u23f1\ufe0f Slowest Operations",
          "description": "Top slowest span operations - helps identify performance bottlenecks",
          "type": "table",
          "gridPos": {
            "h": 10,
            "w": 24,
            "x": 0,
            "y": 70
          },
          "datasource": {
            "uid": "prometheus",
            "type": "prometheus"
          },
          "targets": [
            {
              "expr": "topk(20, histogram_quantile(0.95, sum(rate(traces_traces_duration_milliseconds_bucket[5m])) by (le, span_name)))",
              "format": "table",
              "instant": true
            }
          ],
          "transformations": [
            {
              "id": "organize",
              "options": {
                "excludeByName": {
                  "Time": true,
                  "le": true
                },
                "renameByName": {
                  "span_name": "Operation",
                  "Value": "P95 Latency (ms)"
                }
              }
            },
            {
              "id": "sortBy",
              "options": {
                "sort": [
                  {
                    "field": "P95 Latency (ms)",
                    "desc": true
                  }
                ]
              }
            }
          ],
          "fieldConfig": {
            "overrides": [
              {
                "matcher": {
                  "id": "byName",
                  "options": "P95 Latency (ms)"
                },
                "properties": [
                  {
                    "id": "unit",
                    "value": "ms"
                  },
                  {
                    "id": "decimals",
                    "value": 1
                  },
                  {
                    "id": "custom.cellOptions",
                    "value": {
                      "type": "color-background",
                      "mode": "gradient"
                    }
                  },
                  {
                    "id": "color",
                    "value": {
                      "mode": "continuous-GrYlRd"
                    }
                  }
                ]
              }
            ]
          }
        }
      ],
      "schemaVersion": 39
    }
