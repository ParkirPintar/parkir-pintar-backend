apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
  namespace: monitoring
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: 'parkir-pintar'
        orgId: 1
        folder: 'Parkir Pintar'
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards
          foldersFromFilesStructure: false
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: monitoring
data:
  overview.json: |
    {
      "uid": "parkir-overview",
      "title": "Parkir Pintar - Service Overview",
      "tags": ["parkir-pintar", "overview"],
      "timezone": "browser",
      "refresh": "30s",
      "time": { "from": "now-1h", "to": "now" },
      "templating": {
        "list": [
          {
            "name": "namespace",
            "type": "constant",
            "query": "parkir-pintar",
            "current": { "value": "parkir-pintar", "text": "parkir-pintar" },
            "hide": 2
          },
          {
            "name": "service",
            "type": "query",
            "datasource": "Prometheus",
            "query": "label_values(istio_requests_total{namespace=\"$namespace\"}, destination_service_name)",
            "refresh": 2,
            "multi": true,
            "includeAll": true,
            "current": { "text": "All", "value": "$__all" }
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "title": "Request Rate (req/s)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "sum(rate(istio_requests_total{namespace=\"$namespace\", destination_service_name=~\"$service\"}[5m])) by (destination_service_name)",
              "legendFormat": "{{destination_service_name}}"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "reqps", "custom": { "drawStyle": "line", "fillOpacity": 10 } } }
        },
        {
          "id": 2,
          "title": "Error Rate (5xx)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "sum(rate(istio_requests_total{namespace=\"$namespace\", destination_service_name=~\"$service\", response_code=~\"5.*\"}[5m])) by (destination_service_name)",
              "legendFormat": "{{destination_service_name}}"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "reqps", "custom": { "drawStyle": "line", "fillOpacity": 10 }, "thresholds": { "steps": [{ "color": "green", "value": null }, { "color": "red", "value": 0.1 }] } } }
        },
        {
          "id": 3,
          "title": "P50 Latency",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 8, "x": 0, "y": 8 },
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "histogram_quantile(0.50, sum(rate(istio_request_duration_milliseconds_bucket{namespace=\"$namespace\", destination_service_name=~\"$service\"}[5m])) by (le, destination_service_name))",
              "legendFormat": "{{destination_service_name}}"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "ms" } }
        },
        {
          "id": 4,
          "title": "P95 Latency",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 8, "x": 8, "y": 8 },
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum(rate(istio_request_duration_milliseconds_bucket{namespace=\"$namespace\", destination_service_name=~\"$service\"}[5m])) by (le, destination_service_name))",
              "legendFormat": "{{destination_service_name}}"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "ms" } }
        },
        {
          "id": 5,
          "title": "P99 Latency",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 8, "x": 16, "y": 8 },
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "histogram_quantile(0.99, sum(rate(istio_request_duration_milliseconds_bucket{namespace=\"$namespace\", destination_service_name=~\"$service\"}[5m])) by (le, destination_service_name))",
              "legendFormat": "{{destination_service_name}}"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "ms" } }
        },
        {
          "id": 6,
          "title": "Success Rate (%)",
          "type": "gauge",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 16 },
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "sum(rate(istio_requests_total{namespace=\"$namespace\", destination_service_name=~\"$service\", response_code!~\"5.*\"}[5m])) by (destination_service_name) / sum(rate(istio_requests_total{namespace=\"$namespace\", destination_service_name=~\"$service\"}[5m])) by (destination_service_name) * 100",
              "legendFormat": "{{destination_service_name}}"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "percent", "min": 0, "max": 100, "thresholds": { "steps": [{ "color": "red", "value": null }, { "color": "orange", "value": 95 }, { "color": "green", "value": 99 }] } } }
        },
        {
          "id": 7,
          "title": "Active Connections",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 16 },
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "sum(envoy_cluster_upstream_cx_active{namespace=\"$namespace\"}) by (cluster_name)",
              "legendFormat": "{{cluster_name}}"
            }
          ]
        },
        {
          "id": 8,
          "title": "Pod CPU Usage",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 24 },
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "sum(rate(container_cpu_usage_seconds_total{namespace=\"$namespace\", container!=\"\", container!=\"istio-proxy\"}[5m])) by (pod)",
              "legendFormat": "{{pod}}"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "short" } }
        },
        {
          "id": 9,
          "title": "Pod Memory Usage",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 24 },
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "sum(container_memory_working_set_bytes{namespace=\"$namespace\", container!=\"\", container!=\"istio-proxy\"}) by (pod)",
              "legendFormat": "{{pod}}"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "bytes" } }
        },
        {
          "id": 10,
          "title": "gRPC Response Codes",
          "type": "piechart",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 32 },
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "sum(increase(istio_requests_total{namespace=\"$namespace\", destination_service_name=~\"$service\"}[1h])) by (response_code)",
              "legendFormat": "{{response_code}}"
            }
          ]
        },
        {
          "id": 11,
          "title": "Request Volume by Service",
          "type": "bargauge",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 32 },
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "sum(increase(istio_requests_total{namespace=\"$namespace\"}[1h])) by (destination_service_name)",
              "legendFormat": "{{destination_service_name}}"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "short" } }
        },
        {
          "id": 12,
          "title": "Service Logs",
          "type": "logs",
          "gridPos": { "h": 10, "w": 24, "x": 0, "y": 40 },
          "datasource": "Loki",
          "targets": [
            {
              "expr": "{namespace=\"parkir-pintar\"} |= ``",
              "refId": "A"
            }
          ]
        }
      ],
      "schemaVersion": 39
    }
  istio-mesh.json: |
    {
      "uid": "parkir-istio-mesh",
      "title": "Parkir Pintar - Istio Mesh",
      "tags": ["parkir-pintar", "istio"],
      "timezone": "browser",
      "refresh": "30s",
      "time": { "from": "now-1h", "to": "now" },
      "templating": {
        "list": [
          {
            "name": "namespace",
            "type": "constant",
            "query": "parkir-pintar",
            "current": { "value": "parkir-pintar", "text": "parkir-pintar" },
            "hide": 2
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "title": "Istio Control Plane - istiod CPU",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "sum(rate(container_cpu_usage_seconds_total{namespace=\"istio-system\", container=\"discovery\"}[5m]))",
              "legendFormat": "istiod CPU"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "short" } }
        },
        {
          "id": 2,
          "title": "Istio Control Plane - istiod Memory",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "sum(container_memory_working_set_bytes{namespace=\"istio-system\", container=\"discovery\"})",
              "legendFormat": "istiod Memory"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "bytes" } }
        },
        {
          "id": 3,
          "title": "Envoy Proxy CPU (per pod)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "sum(rate(container_cpu_usage_seconds_total{namespace=\"$namespace\", container=\"istio-proxy\"}[5m])) by (pod)",
              "legendFormat": "{{pod}}"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "short" } }
        },
        {
          "id": 4,
          "title": "Envoy Proxy Memory (per pod)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "sum(container_memory_working_set_bytes{namespace=\"$namespace\", container=\"istio-proxy\"}) by (pod)",
              "legendFormat": "{{pod}}"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "bytes" } }
        },
        {
          "id": 5,
          "title": "Retry Rate per Service",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 16 },
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "sum(rate(envoy_cluster_upstream_rq_retry{namespace=\"$namespace\"}[5m])) by (cluster_name)",
              "legendFormat": "{{cluster_name}}"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "reqps" } }
        },
        {
          "id": 6,
          "title": "Retry Success Rate",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 16 },
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "sum(rate(envoy_cluster_upstream_rq_retry_success{namespace=\"$namespace\"}[5m])) by (cluster_name)",
              "legendFormat": "{{cluster_name}} success"
            },
            {
              "expr": "sum(rate(envoy_cluster_upstream_rq_retry_overflow{namespace=\"$namespace\"}[5m])) by (cluster_name)",
              "legendFormat": "{{cluster_name}} overflow"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "reqps" } }
        },
        {
          "id": 7,
          "title": "Circuit Breaker Ejections (Outlier Detection)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 24 },
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "sum(increase(envoy_cluster_outlier_detection_ejections_total{namespace=\"$namespace\"}[5m])) by (cluster_name)",
              "legendFormat": "{{cluster_name}}"
            }
          ]
        },
        {
          "id": 8,
          "title": "Hosts Ejected (Active)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 24 },
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "sum(envoy_cluster_outlier_detection_ejections_active{namespace=\"$namespace\"}) by (cluster_name)",
              "legendFormat": "{{cluster_name}}"
            }
          ]
        },
        {
          "id": 9,
          "title": "TCP Connections Opened",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 32 },
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "sum(rate(istio_tcp_connections_opened_total{namespace=\"$namespace\"}[5m])) by (destination_service_name)",
              "legendFormat": "{{destination_service_name}}"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "cps" } }
        },
        {
          "id": 10,
          "title": "TCP Connections Closed",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 32 },
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "sum(rate(istio_tcp_connections_closed_total{namespace=\"$namespace\"}[5m])) by (destination_service_name)",
              "legendFormat": "{{destination_service_name}}"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "cps" } }
        },
        {
          "id": 11,
          "title": "Request Size (bytes sent)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 40 },
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "sum(rate(istio_request_bytes_sum{namespace=\"$namespace\"}[5m])) by (destination_service_name)",
              "legendFormat": "{{destination_service_name}}"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "Bps" } }
        },
        {
          "id": 12,
          "title": "Response Size (bytes received)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 40 },
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "sum(rate(istio_response_bytes_sum{namespace=\"$namespace\"}[5m])) by (destination_service_name)",
              "legendFormat": "{{destination_service_name}}"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "Bps" } }
        },
        {
          "id": 13,
          "title": "xDS Push Count (Config Updates)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 48 },
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "sum(rate(pilot_xds_pushes{type=~\".*\"}[5m])) by (type)",
              "legendFormat": "{{type}}"
            }
          ]
        },
        {
          "id": 14,
          "title": "Pilot Proxy Convergence Time",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 48 },
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "histogram_quantile(0.99, sum(rate(pilot_proxy_convergence_time_bucket[5m])) by (le))",
              "legendFormat": "P99 convergence"
            },
            {
              "expr": "histogram_quantile(0.50, sum(rate(pilot_proxy_convergence_time_bucket[5m])) by (le))",
              "legendFormat": "P50 convergence"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "s" } }
        },
        {
          "id": 15,
          "title": "Service-to-Service Traffic Map",
          "type": "table",
          "gridPos": { "h": 10, "w": 24, "x": 0, "y": 56 },
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "sum(rate(istio_requests_total{namespace=\"$namespace\"}[5m])) by (source_workload, destination_service_name, response_code)",
              "format": "table",
              "instant": true
            }
          ],
          "transformations": [
            {
              "id": "organize",
              "options": {
                "renameByName": {
                  "source_workload": "Source",
                  "destination_service_name": "Destination",
                  "response_code": "Status",
                  "Value": "Req/s"
                }
              }
            }
          ]
        }
      ],
      "schemaVersion": 39
    }
  analytics.json: |
    {
      "uid": "parkir-analytics",
      "title": "Parkir Pintar - Business Analytics",
      "tags": ["parkir-pintar", "analytics", "business"],
      "timezone": "browser",
      "refresh": "1m",
      "time": { "from": "now-24h", "to": "now" },
      "templating": {
        "list": [
          {
            "name": "event_type",
            "type": "custom",
            "query": "reservation.confirmed,checkin.confirmed,checkout.completed,checkout.failed,penalty.applied,reservation.cancelled,reservation.expired",
            "multi": true,
            "includeAll": true,
            "current": { "text": "All", "value": "$__all" }
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "title": "Total Events Today",
          "type": "stat",
          "gridPos": { "h": 4, "w": 4, "x": 0, "y": 0 },
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "sum(increase(istio_requests_total{namespace=\"parkir-pintar\", destination_service_name=\"analytics-service\"}[24h]))",
              "legendFormat": "Events"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "short" } }
        },
        {
          "id": 2,
          "title": "Reservations (from logs)",
          "type": "stat",
          "gridPos": { "h": 4, "w": 4, "x": 4, "y": 0 },
          "datasource": "Loki",
          "targets": [
            {
              "expr": "count_over_time({namespace=\"parkir-pintar\", container=\"reservation-service\"} |= `confirmed` [24h])",
              "legendFormat": "Reservations"
            }
          ]
        },
        {
          "id": 3,
          "title": "Check-ins (from logs)",
          "type": "stat",
          "gridPos": { "h": 4, "w": 4, "x": 8, "y": 0 },
          "datasource": "Loki",
          "targets": [
            {
              "expr": "count_over_time({namespace=\"parkir-pintar\", container=\"presence-service\"} |= `checkin` [24h])",
              "legendFormat": "Check-ins"
            }
          ]
        },
        {
          "id": 4,
          "title": "Checkouts (from logs)",
          "type": "stat",
          "gridPos": { "h": 4, "w": 4, "x": 12, "y": 0 },
          "datasource": "Loki",
          "targets": [
            {
              "expr": "count_over_time({namespace=\"parkir-pintar\", container=\"billing-service\"} |= `checkout` [24h])",
              "legendFormat": "Checkouts"
            }
          ]
        },
        {
          "id": 5,
          "title": "Payments (from logs)",
          "type": "stat",
          "gridPos": { "h": 4, "w": 4, "x": 16, "y": 0 },
          "datasource": "Loki",
          "targets": [
            {
              "expr": "count_over_time({namespace=\"parkir-pintar\", container=\"payment-service\"} |= `completed` [24h])",
              "legendFormat": "Payments"
            }
          ]
        },
        {
          "id": 6,
          "title": "Errors (from logs)",
          "type": "stat",
          "gridPos": { "h": 4, "w": 4, "x": 20, "y": 0 },
          "datasource": "Loki",
          "targets": [
            {
              "expr": "count_over_time({namespace=\"parkir-pintar\"} |= `error` [24h])",
              "legendFormat": "Errors"
            }
          ],
          "fieldConfig": { "defaults": { "color": { "mode": "fixed", "fixedColor": "red" } } }
        },
        {
          "id": 7,
          "title": "Transaction Flow - Request Rate per Service",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 4 },
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "sum(rate(istio_requests_total{namespace=\"parkir-pintar\", destination_service_name=~\"reservation-service|presence-service|billing-service|payment-service|search-service\"}[5m])) by (destination_service_name)",
              "legendFormat": "{{destination_service_name}}"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "reqps", "custom": { "drawStyle": "line", "fillOpacity": 15, "stacking": { "mode": "normal" } } } }
        },
        {
          "id": 8,
          "title": "Reservation Service - Latency",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 12 },
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "histogram_quantile(0.50, sum(rate(istio_request_duration_milliseconds_bucket{namespace=\"parkir-pintar\", destination_service_name=\"reservation-service\"}[5m])) by (le))",
              "legendFormat": "P50"
            },
            {
              "expr": "histogram_quantile(0.95, sum(rate(istio_request_duration_milliseconds_bucket{namespace=\"parkir-pintar\", destination_service_name=\"reservation-service\"}[5m])) by (le))",
              "legendFormat": "P95"
            },
            {
              "expr": "histogram_quantile(0.99, sum(rate(istio_request_duration_milliseconds_bucket{namespace=\"parkir-pintar\", destination_service_name=\"reservation-service\"}[5m])) by (le))",
              "legendFormat": "P99"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "ms" } }
        },
        {
          "id": 9,
          "title": "Payment Service - Latency",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 12 },
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "histogram_quantile(0.50, sum(rate(istio_request_duration_milliseconds_bucket{namespace=\"parkir-pintar\", destination_service_name=\"payment-service\"}[5m])) by (le))",
              "legendFormat": "P50"
            },
            {
              "expr": "histogram_quantile(0.95, sum(rate(istio_request_duration_milliseconds_bucket{namespace=\"parkir-pintar\", destination_service_name=\"payment-service\"}[5m])) by (le))",
              "legendFormat": "P95"
            },
            {
              "expr": "histogram_quantile(0.99, sum(rate(istio_request_duration_milliseconds_bucket{namespace=\"parkir-pintar\", destination_service_name=\"payment-service\"}[5m])) by (le))",
              "legendFormat": "P99"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "ms" } }
        },
        {
          "id": 10,
          "title": "Billing Service - Error Rate",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 20 },
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "sum(rate(istio_requests_total{namespace=\"parkir-pintar\", destination_service_name=\"billing-service\", response_code=~\"5.*\"}[5m]))",
              "legendFormat": "5xx errors"
            },
            {
              "expr": "sum(rate(istio_requests_total{namespace=\"parkir-pintar\", destination_service_name=\"billing-service\", response_code=~\"4.*\"}[5m]))",
              "legendFormat": "4xx errors"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "reqps" } }
        },
        {
          "id": 11,
          "title": "Analytics Event Consumer - RabbitMQ",
          "type": "timeseries",
