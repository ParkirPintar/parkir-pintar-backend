apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-topology
  namespace: monitoring
data:
  istio-network-topology.json: |
    {
      "uid": "parkir-istio-topology",
      "title": "Parkir Pintar - Istio Network Topology & gRPC LB",
      "description": "Service mesh topology visualization, per-pod traffic distribution, and gRPC load balancing validation",
      "tags": ["parkir-pintar", "istio", "topology", "grpc", "load-balancing"],
      "timezone": "browser",
      "refresh": "10s",
      "time": { "from": "now-30m", "to": "now" },
      "templating": {
        "list": [
          {
            "name": "namespace",
            "type": "constant",
            "query": "parkir-pintar",
            "current": { "value": "parkir-pintar", "text": "parkir-pintar" },
            "hide": 2
          },
          {
            "name": "service",
            "type": "query",
            "datasource": "Prometheus",
            "query": "label_values(istio_requests_total{destination_service_namespace=\"$namespace\"}, destination_service_name)",
            "refresh": 2,
            "multi": true,
            "includeAll": true,
            "current": { "text": "All", "value": "$__all" }
          },
          {
            "name": "source_service",
            "type": "query",
            "datasource": "Prometheus",
            "query": "label_values(istio_requests_total{destination_service_namespace=\"$namespace\"}, source_workload)",
            "refresh": 2,
            "multi": true,
            "includeAll": true,
            "current": { "text": "All", "value": "$__all" }
          }
        ]
      },
      "panels": [
        {
          "id": 100,
          "title": "🗺️ Service Mesh Traffic Flow (Live)",
          "description": "Real-time traffic flow between services. Shows source → destination with request rate, protocol, and status.",
          "type": "table",
          "gridPos": { "h": 12, "w": 24, "x": 0, "y": 0 },
          "datasource": "Prometheus",
          "targets": [
            {
              "refId": "A",
              "expr": "sort_desc(sum(rate(istio_requests_total{destination_service_namespace=\"$namespace\"}[5m])) by (source_workload, destination_service_name, request_protocol, response_code))",
              "format": "table",
              "instant": true
            }
          ],
          "transformations": [
            {
              "id": "organize",
              "options": {
                "excludeByName": { "Time": true },
                "renameByName": {
                  "source_workload": "Source (Caller)",
                  "destination_service_name": "Destination (Service)",
                  "request_protocol": "Protocol",
                  "response_code": "Response Code",
                  "Value": "Req/s"
                },
                "indexByName": {
                  "Source (Caller)": 0,
                  "Destination (Service)": 1,
                  "Protocol": 2,
                  "Response Code": 3,
                  "Req/s": 4
                }
              }
            },
            {
              "id": "filterByValue",
              "options": {
                "filters": [
                  {
                    "fieldName": "Req/s",
                    "config": { "id": "greater", "options": { "value": 0 } }
                  }
                ],
                "type": "include",
                "match": "any"
              }
            }
          ],
          "fieldConfig": {
            "defaults": {},
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "Req/s" },
                "properties": [
                  { "id": "unit", "value": "reqps" },
                  { "id": "decimals", "value": 4 },
                  { "id": "custom.cellOptions", "value": { "type": "color-background", "mode": "gradient" } },
                  { "id": "color", "value": { "mode": "continuous-GrYlRd" } }
                ]
              },
              {
                "matcher": { "id": "byName", "options": "Response Code" },
                "properties": [
                  {
                    "id": "mappings",
                    "value": [
                      { "type": "value", "options": { "0": { "text": "OK (gRPC)", "color": "green" }, "200": { "text": "200 OK", "color": "green" }, "503": { "text": "503 Unavailable", "color": "red" }, "500": { "text": "500 Error", "color": "red" }, "404": { "text": "404 Not Found", "color": "yellow" } } }
                    ]
                  }
                ]
              }
            ]
          },
          "options": {
            "showHeader": true,
            "sortBy": [{ "displayName": "Req/s", "desc": true }],
            "footer": { "show": true, "reducer": ["sum"], "fields": ["Req/s"] }
          }
        },
        {
          "id": 101,
          "title": "🗺️ Service Topology — Architecture Reference",
          "description": "Static topology reference showing all service connections in the mesh",
          "type": "text",
          "gridPos": { "h": 12, "w": 24, "x": 0, "y": 12 },
          "options": {
            "mode": "markdown",
            "content": "## ParkirPintar Service Mesh Topology\n\n```\n                    ┌─────────────────┐\n                    │   Kong Gateway   │\n                    └────────┬────────┘\n                             │ gRPC + mTLS\n              ┌──────────────┼──────────────┐\n              │              │              │\n              ▼              ▼              ▼\n     ┌────────────┐  ┌────────────┐  ┌────────────┐\n     │   Search   │  │Reservation │  │  Presence  │\n     │  Service   │  │  Service   │  │  Service   │\n     └─────┬──────┘  └──┬────┬───┘  └──┬────┬───┘\n           │             │    │         │    │\n     Redis Cache    RabbitMQ  │    gRPC │    │ gRPC\n     + Read Replica       │   │         │    │\n                          │   ▼         ▼    ▼\n                          │ ┌────────────┐ ┌────────────┐\n                          │ │  Billing   │ │Reservation │\n                          │ │  Service   │ │  (CheckIn) │\n                          │ └─────┬──────┘ └────────────┘\n                          │       │\n                          │       ▼ gRPC\n                          │ ┌────────────┐\n                          │ │  Payment   │──► Settlement Stub\n                          │ │  Service   │   (HTTP + gobreaker)\n                          │ └────────────┘\n                          │\n                          ▼\n              ┌────────────────────────┐\n              │      RabbitMQ          │\n              │  (Consistent Hash)     │\n              └───┬──────────────┬─────┘\n                  │              │\n                  ▼              ▼\n         ┌────────────┐  ┌────────────┐\n         │Notification│  │ Analytics  │\n         │  Service   │  │  Service   │\n         └────────────┘  └────────────┘\n```\n\n**Legend:** All intra-mesh traffic uses gRPC + mTLS (Istio PeerAuthentication STRICT). LB: LEAST_CONN per-request (L7).\n\n**💡 Tip:** For interactive topology, use [Kiali](/kiali) which provides real-time animated traffic flow."
          }
        },
        {
          "id": 2,
          "title": "⚖️ gRPC Load Balancing — Request Distribution per Pod",
          "description": "Shows if LEAST_CONN is distributing evenly across pods. Each instance = one pod. Uneven bars = LB problem",
          "type": "barchart",
          "gridPos": { "h": 10, "w": 24, "x": 0, "y": 24 },
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "sum(rate(istio_requests_total{destination_service_namespace=\"$namespace\", destination_service_name=~\"$service\", reporter=\"destination\"}[5m])) by (destination_workload, instance)",
              "legendFormat": "{{destination_workload}} / {{instance}}",
              "format": "time_series"
            }
          ],
          "options": {
            "orientation": "horizontal",
            "showValue": "always",
            "groupWidth": 0.7,
            "barWidth": 0.8,
            "stacking": "none",
            "legend": { "displayMode": "table", "placement": "right", "calcs": ["mean", "max"] },
            "tooltip": { "mode": "multi" }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "thresholds": {
                "mode": "percentage",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 70 },
                  { "color": "red", "value": 90 }
                ]
              }
            }
          }
        },
        {
          "id": 3,
          "title": "⚖️ Per-Pod Request Rate (Time Series)",
          "description": "Track per-pod request rate over time — lines should be close together if LB is working correctly",
          "type": "timeseries",
          "gridPos": { "h": 10, "w": 12, "x": 0, "y": 34 },
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "sum(rate(istio_requests_total{destination_service_namespace=\"$namespace\", destination_service_name=~\"$service\", reporter=\"destination\"}[1m])) by (instance)",
              "legendFormat": "{{instance}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "custom": {
                "drawStyle": "line",
                "lineWidth": 2,
                "fillOpacity": 10,
                "pointSize": 5,
                "showPoints": "auto"
              }
            }
          },
          "options": {
            "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["mean", "max", "min"] },
            "tooltip": { "mode": "multi" }
          }
        },
        {
          "id": 4,
          "title": "📈 LB Skew Ratio (Max/Avg)",
          "description": "Ratio of busiest pod vs average. Value close to 1.0 = good distribution. >2.0 = LB problem",
          "type": "timeseries",
          "gridPos": { "h": 10, "w": 12, "x": 12, "y": 34 },
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "max(sum(rate(istio_requests_total{destination_service_namespace=\"$namespace\", destination_service_name=~\"$service\", reporter=\"destination\"}[5m])) by (instance)) / avg(sum(rate(istio_requests_total{destination_service_namespace=\"$namespace\", destination_service_name=~\"$service\", reporter=\"destination\"}[5m])) by (instance))",
              "legendFormat": "Skew Ratio (max/avg)"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "none",
              "decimals": 2,
              "custom": {
                "drawStyle": "line",
                "lineWidth": 2,
                "fillOpacity": 20
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 1.5 },
                  { "color": "red", "value": 2.0 }
                ]
              }
            }
          },
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom" }
          }
        },
        {
          "id": 5,
          "title": "🔗 Per-Pod Request Count (by Reporter Instance)",
          "description": "Request count per reporting instance — shows which sidecar proxies are handling traffic",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 44 },
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "sum(rate(istio_requests_total{destination_service_namespace=\"$namespace\", destination_service_name=~\"$service\"}[5m])) by (instance, reporter)",
              "legendFormat": "{{instance}} ({{reporter}})"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "custom": { "drawStyle": "line", "fillOpacity": 15 }
            }
          }
        },
        {
          "id": 6,
          "title": "📡 Request Rate by Source → Destination (per instance)",
          "description": "Detailed per-instance traffic showing which source pods call which destination pods",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 44 },
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "sum(rate(istio_requests_total{destination_service_namespace=\"$namespace\", destination_service_name=~\"$service\", reporter=\"destination\"}[5m])) by (source_workload, instance)",
              "legendFormat": "{{source_workload}} → {{instance}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "custom": { "drawStyle": "line", "fillOpacity": 15 }
            }
          }
        },
        {
          "id": 7,
          "title": "⏱️ Per-Pod Latency (P95)",
          "description": "If one pod has significantly higher latency, LEAST_CONN should route less traffic to it",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 52 },
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum(rate(istio_request_duration_milliseconds_bucket{destination_service_namespace=\"$namespace\", destination_service_name=~\"$service\", reporter=\"destination\"}[5m])) by (le, instance))",
              "legendFormat": "{{instance}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "ms",
              "custom": { "drawStyle": "line", "fillOpacity": 10 }
            }
          }
        },
        {
          "id": 8,
          "title": "🚨 Error Rate per Service",
          "description": "5xx and 4xx error rates per destination service",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 52 },
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "sum(rate(istio_requests_total{destination_service_namespace=\"$namespace\", destination_service_name=~\"$service\", response_code=~\"5.*\"}[5m])) by (destination_service_name)",
              "legendFormat": "{{destination_service_name}} 5xx"
            },
            {
              "expr": "sum(rate(istio_requests_total{destination_service_namespace=\"$namespace\", destination_service_name=~\"$service\", response_code=~\"4.*\"}[5m])) by (destination_service_name)",
              "legendFormat": "{{destination_service_name}} 4xx"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "custom": { "drawStyle": "line", "fillOpacity": 20 }
            }
          }
        },
        {
          "id": 9,
          "title": "📊 Traffic Distribution Heatmap (Instance × Time)",
          "description": "Heatmap showing request distribution across instances over time. Even color = good LB",
          "type": "heatmap",
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 60 },
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "sum(rate(istio_requests_total{destination_service_namespace=\"$namespace\", destination_service_name=~\"$service\", reporter=\"destination\"}[1m])) by (instance)",
              "legendFormat": "{{instance}}",
              "format": "heatmap"
            }
          ],
          "options": {
            "calculate": false,
            "color": {
              "scheme": "Spectral",
              "mode": "scheme"
            },
            "yAxis": {
              "unit": "reqps"
            }
          }
        },
        {
          "id": 10,
          "title": "🌐 Inbound Traffic per Service",
          "description": "Who is calling whom — helps identify traffic patterns and potential bottlenecks",
          "type": "table",
          "gridPos": { "h": 10, "w": 12, "x": 0, "y": 68 },
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "sum(rate(istio_requests_total{destination_service_namespace=\"$namespace\", destination_service_name=~\"$service\"}[5m])) by (source_workload, destination_service_name)",
              "format": "table",
              "instant": true
            }
          ],
          "transformations": [
            {
              "id": "organize",
              "options": {
                "excludeByName": { "Time": true },
                "renameByName": {
                  "source_workload": "Caller",
                  "destination_service_name": "Service",
                  "Value": "Req/s"
                }
              }
            },
            {
              "id": "sortBy",
              "options": {
                "sort": [{ "field": "Req/s", "desc": true }]
              }
            }
          ],
          "fieldConfig": {
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "Req/s" },
                "properties": [{ "id": "unit", "value": "reqps" }, { "id": "decimals", "value": 4 }]
              }
            ]
          }
        },
        {
          "id": 11,
          "title": "📤 Outbound Traffic per Service",
          "description": "Outbound calls from each service — shows dependency graph",
          "type": "table",
          "gridPos": { "h": 10, "w": 12, "x": 12, "y": 68 },
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "sum(rate(istio_requests_total{destination_service_namespace=\"$namespace\", source_workload=~\"$source_service\"}[5m])) by (source_workload, destination_service_name)",
              "format": "table",
              "instant": true
            }
          ],
          "transformations": [
            {
              "id": "organize",
              "options": {
                "excludeByName": { "Time": true },
                "renameByName": {
                  "source_workload": "Service",
                  "destination_service_name": "Calls To",
                  "Value": "Req/s"
                }
              }
            },
            {
              "id": "sortBy",
              "options": {
                "sort": [{ "field": "Req/s", "desc": true }]
              }
            }
          ],
          "fieldConfig": {
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "Req/s" },
                "properties": [{ "id": "unit", "value": "reqps" }, { "id": "decimals", "value": 4 }]
              }
            ]
          }
        },
        {
          "id": 12,
          "title": "⚡ gRPC Method-Level Traffic",
          "description": "Traffic breakdown by gRPC method — see which RPCs are hottest",
          "type": "bargauge",
          "gridPos": { "h": 10, "w": 24, "x": 0, "y": 78 },
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "sum(rate(istio_requests_total{destination_service_namespace=\"$namespace\", destination_service_name=~\"$service\", request_protocol=\"grpc\"}[5m])) by (destination_service_name)",
              "legendFormat": "{{destination_service_name}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "thresholds": {
                "steps": [
                  { "color": "blue", "value": null },
                  { "color": "green", "value": 1 },
                  { "color": "yellow", "value": 10 },
                  { "color": "red", "value": 50 }
                ]
              }
            }
          },
          "options": {
            "orientation": "horizontal",
            "displayMode": "gradient",
            "showUnfilled": true
          }
        },
        {
          "id": 13,
          "title": "📊 Request Volume by Service (Total)",
          "description": "Total request volume per service in the last hour",
          "type": "bargauge",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 88 },
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "sum(increase(istio_requests_total{destination_service_namespace=\"$namespace\"}[1h])) by (destination_service_name)",
              "legendFormat": "{{destination_service_name}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": {
                "steps": [
                  { "color": "blue", "value": null },
                  { "color": "green", "value": 100 },
                  { "color": "yellow", "value": 1000 },
                  { "color": "red", "value": 5000 }
                ]
              }
            }
          },
          "options": {
            "orientation": "horizontal",
            "displayMode": "gradient",
            "showUnfilled": true
          }
        },
        {
          "id": 14,
          "title": "✅ Success Rate per Service (%)",
          "description": "Percentage of non-5xx responses per service. Below 99% = investigate",
          "type": "gauge",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 88 },
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "sum(rate(istio_requests_total{destination_service_namespace=\"$namespace\", destination_service_name=~\"$service\", response_code!~\"5.*\"}[5m])) by (destination_service_name) / sum(rate(istio_requests_total{destination_service_namespace=\"$namespace\", destination_service_name=~\"$service\"}[5m])) by (destination_service_name) * 100",
              "legendFormat": "{{destination_service_name}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0,
              "max": 100,
              "thresholds": {
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "orange", "value": 95 },
                  { "color": "green", "value": 99 }
                ]
              }
            }
          }
        }
      ],
      "schemaVersion": 39
    }
