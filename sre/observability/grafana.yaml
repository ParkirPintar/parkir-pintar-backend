apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: monitoring
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        uid: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
      - name: Loki
        type: loki
        uid: loki
        access: proxy
        url: http://loki:3100
        jsonData:
          derivedFields:
            - datasourceUid: tempo
              matcherRegex: '"trace_id":"([a-f0-9]+)"'
              name: TraceID
              url: "$${__value.raw}"
              urlDisplayLabel: "View Trace"
            - datasourceUid: tempo
              matcherRegex: 'trace_id=([a-f0-9]+)'
              name: TraceID
              url: "$${__value.raw}"
              urlDisplayLabel: "View Trace"
      - name: Tempo
        type: tempo
        uid: tempo
        access: proxy
        url: http://tempo:3200
        jsonData:
          streamingEnabled:
            search: true
            traceqlSearch: true
          search:
            filters: []
          traceQuery:
            timeShiftEnabled: true
            spanStartTimeShift: "-1h"
            spanEndTimeShift: "1h"
          tracesToLogsV2:
            datasourceUid: loki
            spanStartTimeShift: "-1h"
            spanEndTimeShift: "1h"
            filterByTraceID: true
            filterBySpanID: false
            tags:
              - key: "service"
                value: "service_name"
          tracesToMetrics:
            datasourceUid: prometheus
            spanStartTimeShift: "-1h"
            spanEndTimeShift: "1h"
            tags:
              - key: "service.name"
                value: "destination_service_name"
            queries:
              - name: "Request Rate"
                query: "sum(rate(istio_requests_total{destination_service_name=\"$${__tags}\"}[5m]))"
              - name: "Error Rate"
                query: "sum(rate(istio_requests_total{destination_service_name=\"$${__tags}\", response_code=~\"5.*\"}[5m]))"
          serviceMap:
            datasourceUid: prometheus
          nodeGraph:
            enabled: true
          lokiSearch:
            datasourceUid: loki
      - name: Analytics DB
        type: postgres
        uid: analytics-db
        access: proxy
        url: $__env{ANALYTICS_DB_HOST}:$__env{ANALYTICS_DB_PORT}
        user: $__env{ANALYTICS_DB_USER}
        editable: false
        jsonData:
          database: $__env{ANALYTICS_DB_NAME}
          sslmode: require
          maxOpenConns: 5
          maxIdleConns: 2
          connMaxLifetime: 14400
        secureJsonData:
          password: $__env{ANALYTICS_DB_PASSWORD}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-env
  namespace: monitoring
data:
  GF_SERVER_ROOT_URL: "https://parkir-pintar.pondongopi.biz.id/monitor"
  GF_SERVER_SERVE_FROM_SUB_PATH: "true"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      securityContext:
        fsGroup: 472
        runAsUser: 472
      containers:
        - name: grafana
          image: grafana/grafana:10.3.1
          ports:
            - containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: grafana-secret
                  key: admin-password
            - name: ANALYTICS_DB_HOST
              valueFrom:
                secretKeyRef:
                  name: grafana-db-secret
                  key: host
            - name: ANALYTICS_DB_PORT
              valueFrom:
                secretKeyRef:
                  name: grafana-db-secret
                  key: port
            - name: ANALYTICS_DB_NAME
              valueFrom:
                secretKeyRef:
                  name: grafana-db-secret
                  key: database
            - name: ANALYTICS_DB_USER
              valueFrom:
                secretKeyRef:
                  name: grafana-db-secret
                  key: username
            - name: ANALYTICS_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: grafana-db-secret
                  key: password
          envFrom:
            - configMapRef:
                name: grafana-env
          volumeMounts:
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: dashboard-provider
              mountPath: /etc/grafana/provisioning/dashboards
            - name: dashboards
              mountPath: /var/lib/grafana/dashboards
            - name: dashboards-topology
              mountPath: /var/lib/grafana/dashboards/topology
            - name: dashboards-traces
              mountPath: /var/lib/grafana/dashboards/traces
            - name: data
              mountPath: /var/lib/grafana
      volumes:
        - name: datasources
          configMap:
            name: grafana-datasources
        - name: dashboard-provider
          configMap:
            name: grafana-dashboard-provider
        - name: dashboards
          configMap:
            name: grafana-dashboards
        - name: dashboards-topology
          configMap:
            name: grafana-dashboard-topology
        - name: dashboards-traces
          configMap:
            name: grafana-dashboard-traces
        - name: data
          persistentVolumeClaim:
            claimName: grafana-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: monitoring
spec:
  selector:
    app: grafana
  ports:
    - port: 3000
      targetPort: 3000
