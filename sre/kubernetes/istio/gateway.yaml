apiVersion: networking.istio.io/v1alpha3
kind: Gateway
metadata:
  name: parkirpintar-gateway
  namespace: parkir-pintar
spec:
  selector:
    istio: ingressgateway
  servers:
    - port:
        number: 80
        name: http
        protocol: HTTP
      hosts:
        - "*"
    - port:
        number: 443
        name: https
        protocol: HTTPS
      tls:
        mode: SIMPLE
        credentialName: parkirpintar-tls
      hosts:
        - "*"
---
apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: parkirpintar-ingress
  namespace: parkir-pintar
spec:
  hosts:
    - "*"
  gateways:
    - parkirpintar-gateway
  http:
    - match:
        - uri:
            prefix: /
      route:
        - destination:
            host: kong-gateway
            port:
              number: 80
