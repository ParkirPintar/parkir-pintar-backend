apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics-service
  namespace: parkir-pintar
spec:
  replicas: 2
  selector:
    matchLabels:
      app: analytics-service
  template:
    metadata:
      labels:
        app: analytics-service
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9091"
    spec:
      containers:
        - name: analytics-service
          image: parkirpintar/analytics-service:latest
          ports:
            - containerPort: 50051
              name: grpc
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: parkirpintar-config
            - secretRef:
                name: analytics-db-secret
            - secretRef:
                name: rabbitmq-secret
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: analytics-service
  namespace: parkir-pintar
spec:
  selector:
    app: analytics-service
  ports:
    - port: 50051
      targetPort: 50051
      name: grpc
    - port: 8080
      targetPort: 8080
      name: http
  type: ClusterIP
