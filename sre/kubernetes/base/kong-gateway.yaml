apiVersion: apps/v1
kind: Deployment
metadata:
  name: kong-gateway
  namespace: parkir-pintar
spec:
  replicas: 3
  selector:
    matchLabels:
      app: kong-gateway
  template:
    metadata:
      labels:
        app: kong-gateway
        version: v1
    spec:
      containers:
        - name: kong
          image: kong:3.6
          ports:
            - containerPort: 8000
              name: proxy
            - containerPort: 8443
              name: proxy-ssl
            - containerPort: 8001
              name: admin
          env:
            - name: KONG_DATABASE
              value: "off"
            - name: KONG_PROXY_LISTEN
              value: "0.0.0.0:8000, 0.0.0.0:8443 ssl"
            - name: KONG_ADMIN_LISTEN
              value: "0.0.0.0:8001"
            - name: KONG_DECLARATIVE_CONFIG
              value: "/etc/kong/kong.yml"
          volumeMounts:
            - name: kong-config
              mountPath: /etc/kong
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 512Mi
      volumes:
        - name: kong-config
          configMap:
            name: kong-config
---
apiVersion: v1
kind: Service
metadata:
  name: kong-gateway
  namespace: parkir-pintar
spec:
  selector:
    app: kong-gateway
  ports:
    - name: proxy
      port: 80
      targetPort: 8000
    - name: proxy-ssl
      port: 443
      targetPort: 8443
  type: ClusterIP
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: kong-config
  namespace: parkir-pintar
data:
  kong.yml: |
    _format_version: "3.0"

    plugins:
      - name: rate-limiting
        config:
          minute: 60
          policy: local

    services:
      # REST API Gateway — translates HTTP/JSON to gRPC
      - name: api
        url: http://gateway-service.parkir-pintar.svc.cluster.local:8080
        routes:
          - name: api-route
            paths: ["/v1"]
            strip_path: false
            protocols: [http, https]

      # Grafana (monitoring dashboard)
      - name: grafana
        url: http://grafana.monitoring.svc.cluster.local:3000
        routes:
          - name: monitor-route
            paths: ["/monitor"]
            strip_path: false
        plugins:
          - name: rate-limiting
            config:
              minute: 30
              policy: local
