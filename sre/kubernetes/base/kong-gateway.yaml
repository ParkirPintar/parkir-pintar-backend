apiVersion: apps/v1
kind: Deployment
metadata:
  name: kong-gateway
  namespace: parkir-pintar
spec:
  replicas: 3
  selector:
    matchLabels:
      app: kong-gateway
  template:
    metadata:
      labels:
        app: kong-gateway
        version: v1
      annotations:
        traffic.sidecar.istio.io/excludeOutboundPorts: "8080"
    spec:
      containers:
        - name: kong
          image: kong:3.6
          ports:
            - containerPort: 8000
              name: proxy
            - containerPort: 8443
              name: proxy-ssl
            - containerPort: 8001
              name: admin
          env:
            - name: KONG_DATABASE
              value: "off"
            - name: KONG_PROXY_LISTEN
              value: "0.0.0.0:8000, 0.0.0.0:8443 ssl"
            - name: KONG_ADMIN_LISTEN
              value: "0.0.0.0:8001"
            - name: KONG_DECLARATIVE_CONFIG
              value: "/etc/kong/kong.yml"
            - name: KONG_DNS_RESOLVER
              value: "172.20.0.10"
            - name: KONG_DNS_ORDER
              value: "LAST,A,SRV,CNAME"
          volumeMounts:
            - name: kong-config
              mountPath: /etc/kong
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 512Mi
      volumes:
        - name: kong-config
          configMap:
            name: kong-config
---
apiVersion: v1
kind: Service
metadata:
  name: kong-gateway
  namespace: parkir-pintar
spec:
  selector:
    app: kong-gateway
  ports:
    - name: proxy
      port: 80
      targetPort: 8000
    - name: proxy-ssl
      port: 443
      targetPort: 8443
  type: ClusterIP
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: kong-config
  namespace: parkir-pintar
data:
  kong.yml: |
    _format_version: "3.0"

    plugins:
      - name: rate-limiting
        config:
          minute: 60
          policy: local

    services:
      # Search Service — availability queries
      - name: search
        url: http://search-service.parkir-pintar.svc.cluster.local:8080
        routes:
          - name: search-availability
            paths: ["/v1/availability"]
            strip_path: false
            protocols: [http, https]

      # Reservation Service — create, hold, cancel, get reservations
      - name: reservation
        url: http://reservation-service.parkir-pintar.svc.cluster.local:8080
        routes:
          - name: reservation-spots
            paths: ["/v1/spots"]
            strip_path: false
            protocols: [http, https]
          - name: reservation-api
            paths: ["/v1/reservations"]
            strip_path: false
            protocols: [http, https]

      # Presence Service — check-in, check-out, location
      - name: presence
        url: http://presence-service.parkir-pintar.svc.cluster.local:8080
        routes:
          - name: presence-checkin
            paths: ["/v1/checkin"]
            strip_path: false
            protocols: [http, https]
          - name: presence-location
            paths: ["/v1/presence"]
            strip_path: false
            protocols: [http, https]
          - name: presence-checkout-gate
            paths: ["/v1/checkout/gate"]
            strip_path: false
            protocols: [http, https]

      # Billing Service — checkout/invoice
      - name: billing
        url: http://billing-service.parkir-pintar.svc.cluster.local:8080
        routes:
          - name: billing-checkout
            paths: ["/v1/checkout"]
            strip_path: false
            protocols: [http, https]

      # Payment Service — payment status, retry
      - name: payment
        url: http://payment-service.parkir-pintar.svc.cluster.local:8080
        routes:
          - name: payment-api
            paths: ["/v1/payments"]
            strip_path: false
            protocols: [http, https]

      # Grafana (monitoring dashboard)
      - name: grafana
        url: http://grafana.monitoring.svc.cluster.local:3000
        routes:
          - name: monitor-route
            paths: ["/monitor"]
            strip_path: false
        plugins:
          - name: rate-limiting
            config:
              minute: 30
              policy: local
