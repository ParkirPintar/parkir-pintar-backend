apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: parkir-pintar
spec:
  replicas: 2
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9091"
        traffic.sidecar.istio.io/excludeInboundPorts: "8080"
      containers:
        - name: notification-service
          image: parkirpintar/notification-service:latest
          ports:
            - containerPort: 50051
              name: grpc
            - containerPort: 8080
              name: http-rest
          envFrom:
            - configMapRef:
                name: parkirpintar-config
            - secretRef:
                name: rabbitmq-secret
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: parkir-pintar
spec:
  selector:
    app: notification-service
  ports:
    - port: 50051
      targetPort: 50051
      name: grpc
    - port: 8080
      targetPort: 8080
      name: http-rest
  type: ClusterIP
