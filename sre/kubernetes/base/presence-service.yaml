apiVersion: apps/v1
kind: Deployment
metadata:
  name: presence-service
  namespace: parkir-pintar
spec:
  replicas: 3
  selector:
    matchLabels:
      app: presence-service
  template:
    metadata:
      labels:
        app: presence-service
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9091"
    spec:
      containers:
        - name: presence-service
          image: parkirpintar/presence-service:latest
          ports:
            - containerPort: 50051
              name: grpc
          envFrom:
            - configMapRef:
                name: parkirpintar-config
            - secretRef:
                name: redis-secret
          livenessProbe:
            grpc:
              port: 50051
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            grpc:
              port: 50051
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: presence-service
  namespace: parkir-pintar
spec:
  selector:
    app: presence-service
  ports:
    - port: 50051
      targetPort: 50051
      name: grpc
  type: ClusterIP
