apiVersion: batch/v1
kind: Job
metadata:
  name: db-migrate
  namespace: parkir-pintar
  labels:
    app: db-migrate
spec:
  backoffLimit: 1
  ttlSecondsAfterFinished: 600
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: migrate
          image: migrate/migrate:v4.18.3
          command: ["sh", "-c"]
          args:
            - |
              set -e

              echo "=== Migrating reservation DB ==="
              migrate -path=/migrations/reservation -database "${RESERVATION_DB_URL}" up

              echo "=== Migrating billing DB ==="
              migrate -path=/migrations/billing -database "${BILLING_DB_URL}" up

              echo "=== Migrating payment DB ==="
              migrate -path=/migrations/payment -database "${PAYMENT_DB_URL}" up

              echo "=== Migrating analytics DB ==="
              migrate -path=/migrations/analytics -database "${ANALYTICS_DB_URL}" up

              echo "=== All migrations complete ==="
          env:
            - name: RESERVATION_DB_URL
              valueFrom:
                secretKeyRef:
                  name: reservation-db-secret
                  key: DATABASE_URL
            - name: BILLING_DB_URL
              valueFrom:
                secretKeyRef:
                  name: billing-db-secret
                  key: DATABASE_URL
            - name: PAYMENT_DB_URL
              valueFrom:
                secretKeyRef:
                  name: payment-db-secret
                  key: DATABASE_URL
            - name: ANALYTICS_DB_URL
              valueFrom:
                secretKeyRef:
                  name: analytics-db-secret
                  key: DATABASE_URL
          volumeMounts:
            - name: migration-reservation
              mountPath: /migrations/reservation
            - name: migration-billing
              mountPath: /migrations/billing
            - name: migration-payment
              mountPath: /migrations/payment
            - name: migration-analytics
              mountPath: /migrations/analytics
      volumes:
        - name: migration-reservation
          configMap:
            name: migrate-reservation
        - name: migration-billing
          configMap:
            name: migrate-billing
        - name: migration-payment
          configMap:
            name: migrate-payment
        - name: migration-analytics
          configMap:
            name: migrate-analytics
